name: Create PR

on:
  push:
    branches-ignore:
      - main

jobs:
  create_and_enable_automerge:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'renovate[bot]'
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set branch name as output
        id: branch_name
        run: echo "branch=${GITHUB_REF#refs/heads/}" >> "$GITHUB_OUTPUT"

      - name: Check if PR already exists
        id: check_pr
        run: |
          EXISTING_PR=$(gh pr list --head "${{ steps.branch_name.outputs.branch }}" --base main --json number --jq '.[0].number // empty')
          echo "existing_pr=$EXISTING_PR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create Pull Request
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail
          BRANCH="${{ steps.branch_name.outputs.branch }}"
          EXISTING=$(curl -fsS \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${{ github.repository_owner }}:$BRANCH&base=main&state=open")
          PR_NUMBER=$(echo "$EXISTING" | jq -r '.[0].number // empty')
          if [ -n "$PR_NUMBER" ]; then
            echo "Pull request already exists: #$PR_NUMBER"
          else
            JSON=$(jq -n \
              --arg title "$BRANCH" \
              --arg head "$BRANCH" \
              '{title: $title, head: $head, base: "main", body: ":magic_wand: :sparkles:\n", draft: false}')
            NEW_PR=$(curl -fsS -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls" \
              -d "$JSON")
            PR_NUMBER=$(echo "$NEW_PR" | jq -r '.number // empty')
            if [ -z "$PR_NUMBER" ]; then
              echo "Failed to create pull request" >&2
              echo "$NEW_PR" >&2
              exit 1
            fi
            echo "Created pull request: #$PR_NUMBER"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Resolve PR number
        id: resolve_pr
        run: |
          PR_NUMBER="${{ steps.create_pr.outputs.pr_number }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="${{ steps.check_pr.outputs.existing_pr }}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Assign PR to author
        if: steps.resolve_pr.outputs.pr_number
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"assignees":["${{ github.actor }}"]}' \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.resolve_pr.outputs.pr_number }}/assignees"

      - name: Get PR Node ID
        if: steps.resolve_pr.outputs.pr_number
        id: get_pr_id
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PR_DATA=$(curl -fsS -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.resolve_pr.outputs.pr_number }}")
          PR_ID=$(echo "$PR_DATA" | jq -r '.node_id')
          if [ -z "$PR_ID" ] || [ "$PR_ID" = "null" ]; then
            echo "Failed to retrieve a valid PR node_id for PR #${{ steps.resolve_pr.outputs.pr_number }}" >&2
            exit 1
          fi
          echo "node_id=$PR_ID" >> "$GITHUB_OUTPUT"

      - name: Enable Auto Merge for PR
        if: steps.resolve_pr.outputs.pr_number
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          if RESPONSE=$(curl -fsS -X POST \
            -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation($id: ID!) { enablePullRequestAutoMerge(input: { pullRequestId: $id }) { clientMutationId } }",
              "variables": {
                "id": "'"${{ steps.get_pr_id.outputs.node_id }}"'"
              }
            }' \
            "https://api.github.com/graphql"); then
            echo "$RESPONSE"
            if echo "$RESPONSE" | jq -e '.errors' >/dev/null; then
              echo "::warning::Failed to enable auto-merge: $(echo "$RESPONSE" | jq -c '.errors')"
            fi
          else
            echo "::warning::Failed to call GitHub API for auto-merge"
          fi
